# Values for the Vaultwarden + backup Helm chart.

# Override the chart name portion used in generated resource names.
nameOverride: ""

# Override the full generated release name.
fullnameOverride: ""

# Namespace applied to all rendered resources.
namespace: vaultwarden

# Optional image pull secrets for private registries.
imagePullSecrets: []

# Canonical image definitions used across the chart.
images:
  # Main Vaultwarden application image.
  vaultwarden:
    repository: docker.io/vaultwarden/server
    tag: latest
    pullPolicy: IfNotPresent
  # Restic runtime image. In practice this should be the custom image that
  # includes both Restic and rclone.
  restic:
    repository: docker.io/restic/restic
    tag: latest
    pullPolicy: IfNotPresent
  # Upstream rclone image reference used to assemble the custom Restic image.
  rclone:
    repository: docker.io/rclone/rclone
    tag: latest
    pullPolicy: IfNotPresent
  # kubectl image used by the backup job init container to copy the kubectl
  # binary into a shared tools volume.
  kubectl:
    repository: docker.io/bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent

# Shared service account used by the main Vaultwarden workload.
serviceAccount:
  # Create the service account when true.
  create: true
  # Mount the service account token into pods when true.
  automount: true
  # Additional annotations for the service account.
  annotations: {}
  # Explicit service account name. Leave empty to generate one.
  name: ""

# Dedicated service account used by the backup job to scale Vaultwarden down
# and back up around the backup window.
backupServiceAccount:
  # Create the backup service account when true.
  create: true
  # Mount the service account token into the backup job pod when true.
  automount: true
  # Additional annotations for the backup service account.
  annotations: {}
  # Explicit backup service account name. Leave empty to generate one.
  name: ""

# Pod annotations shared by chart-managed workloads.
podAnnotations: {}

# Pod labels shared by chart-managed workloads.
podLabels: {}

# Pod-level security context applied to workloads.
podSecurityContext: {}

# Container-level security context applied to workloads.
securityContext: {}

vaultwarden:
  # Enable the main Vaultwarden workload.
  enabled: true
  # Number of Vaultwarden replicas. Keep at 1 for the shared RWO volume model.
  replicaCount: 1
  service:
    # Service type for Vaultwarden.
    type: ClusterIP
    # Service port exposed to the cluster.
    port: 80
    # Container port forwarded by the service.
    targetPort: 12345
  ingress:
    # Enable Traefik ingress for Vaultwarden.
    enabled: true
    # Ingress class name.
    className: traefik
    # Default annotations assume cert-manager staging certificates.
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging
    # Ingress host and path definitions.
    hosts:
      - host: vaultwarden.example.com
        paths:
          - path: /
            pathType: Prefix
    # TLS configuration for the ingress.
    tls:
      - secretName: vaultwarden-example-com-tls
        hosts:
          - vaultwarden.example.com
  persistence:
    # Create or use a PVC for Vaultwarden data.
    enabled: true
    # openebs-lvmpv is expected by default for the shared data volume.
    storageClassName: openebs-lvmpv
    # Access modes for the shared data PVC.
    accessModes:
      - ReadWriteOnce
    # Requested volume size.
    size: 5Gi
    # Mount path shared by Vaultwarden and the backup job.
    mountPath: /data
    # Use an existing PVC instead of creating one when set.
    existingClaim: ""
  env:
    # Public base URL for Vaultwarden.
    DOMAIN: "https://vaultwarden.example.com"
    # Internal Rocket port.
    ROCKET_PORT: 12345
    # Disable open registrations by default.
    SIGNUPS_ALLOWED: false
  # Resource requests and limits for the Vaultwarden container.
  resources: {}

backupCronJob:
  # Enable the single Restic backup cron job.
  enabled: true
  # Cron schedule for the backup job. Default is hourly.
  schedule: "0 * * * *"
  # Prevent overlapping runs.
  concurrencyPolicy: Forbid
  # Number of successful jobs to retain.
  successfulJobsHistoryLimit: 1
  # Number of failed jobs to retain.
  failedJobsHistoryLimit: 3
  # Pod restart policy for failed job containers.
  restartPolicy: OnFailure
  # Secret that stores the rendered rclone.conf for the job.
  secret:
    create: true
    name: vaultwarden-backup-webdav
  # Resource requests and limits for the backup job.
  resources: {}
  # Shared PVC mount path. The Restic backup runs directly against this path.
  sourceMountPath: /data
  # Backup tag applied to every Restic snapshot from this job.
  backupTag: vaultwarden
  # Additional tag that identifies the source host or deployment.
  hostTag: k8s-vaultwarden
  # Files or directories excluded from the Restic backup.
  # By default, optional Vaultwarden paths such as `sends/` and `icon_cache/`
  # remain included because the job snapshots the whole `/data` directory.
  # Add entries here to exclude optional paths when desired.
  excludePaths: []
  # Timeout used while waiting for Vaultwarden pods to terminate.
  scaleDownTimeout: 300s
  # Interval between checks while waiting for Vaultwarden pods to terminate.
  scaleDownPollInterval: 5s
  # Timeout used while waiting for Vaultwarden pods to return after scale-up.
  scaleTimeout: 300s
  # Additional shell commands appended after the default backup logic.
  extraScript: ""

webdav:
  # rclone remote name referenced by Restic.
  remoteName: remote-webdav
  # rclone backend type.
  type: webdav
  # rclone vendor for the WebDAV endpoint.
  vendor: other
  # WebDAV endpoint URL.
  url: "https://webdav.example.com"
  # WebDAV username.
  username: "username"
  # WebDAV password already obscured with `rclone obscure`.
  password: "password"
  # Path where rclone expects the configuration file.
  configPath: /root/.config/rclone/rclone.conf

restic:
  build:
    # Flag documenting that a custom image build is expected.
    enabled: true
    # Dockerfile used to build the custom Restic image.
    dockerfile: Dockerfile.restic
    # Upstream base image copied into the custom build.
    sourceResticImage:
      repository: docker.io/restic/restic
      tag: latest
    # Upstream rclone image copied into the custom build.
    sourceRcloneImage:
      repository: docker.io/rclone/rclone
      tag: latest
  repository:
    # Restic repository backend. This chart assumes rclone.
    backend: rclone
    # rclone remote name used in the Restic repository URL.
    remoteName: remote-webdav
    # Remote folder that stores the Restic repository.
    remoteFolder: restic-backup
  passwordSecret:
    # Create the secret holding RESTIC_PASSWORD when true.
    create: true
    # Name of the Restic password secret.
    name: vaultwarden-restic-password
    # Key that stores the password value.
    key: RESTIC_PASSWORD
    # Secret value used when create=true. Override in real deployments.
    value: change-me
  retention:
    # Number of most recent hourly snapshots to keep.
    keepLast: 24
    # Number of daily snapshots to keep.
    keepDaily: 30
    # Number of weekly snapshots to keep.
    keepWeekly: 8
    # Number of monthly snapshots to keep.
    keepMonthly: 12
    # Run `restic forget` with `--prune` when true.
    prune: true
  # Additional arguments appended to the Restic backup command.
  extraArgs: []

affinity:
  # Enable same-node scheduling hints for workloads using the shared PVC.
  enabled: true
  sameNode:
    # Topology key used to collocate pods on the same node.
    topologyKey: kubernetes.io/hostname

# Node selector shared by chart-managed workloads.
nodeSelector: {}

# Tolerations shared by chart-managed workloads.
tolerations: []
