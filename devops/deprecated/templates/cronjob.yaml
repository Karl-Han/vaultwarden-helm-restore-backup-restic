{{- if .Values.backupCronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "vaultwarden_backup.backupCronJobName" . }}
  namespace: {{ include "vaultwarden_backup.namespace" . }}
  labels:
    {{- include "vaultwarden_backup.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backupCronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.backupCronJob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.backupCronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backupCronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "vaultwarden_backup.labels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: {{ include "vaultwarden_backup.backupServiceAccountName" . }}
          restartPolicy: {{ .Values.backupCronJob.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.affinity.enabled }}
          affinity:
            {{- include "vaultwarden_backup.sharedVolumeAffinity" . | nindent 12 }}
          {{- end }}
          initContainers:
            - name: install-kubectl
              image: "{{ .Values.images.kubectl.repository }}:{{ .Values.images.kubectl.tag }}"
              imagePullPolicy: {{ .Values.images.kubectl.pullPolicy }}
              command:
                - /bin/sh
                - -ec
                - |
                  cp "$(command -v kubectl)" /tools/kubectl
                  chmod 0755 /tools/kubectl
              volumeMounts:
                - name: tools
                  mountPath: /tools
          containers:
            - name: backup
              image: "{{ .Values.images.restic.repository }}:{{ .Values.images.restic.tag }}"
              imagePullPolicy: {{ .Values.images.restic.pullPolicy }}
              {{- with .Values.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              env:
                - name: PATH
                  value: /tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.restic.passwordSecret.name }}
                      key: {{ .Values.restic.passwordSecret.key }}
              command:
                - /bin/sh
                - -ec
                - |
                  VAULTWARDEN_STATEFULSET="{{ include "vaultwarden_backup.vaultwardenName" . }}"
                  VAULTWARDEN_NAMESPACE="{{ include "vaultwarden_backup.namespace" . }}"
                  VAULTWARDEN_REPLICAS="{{ .Values.vaultwarden.replicaCount }}"
                  VW_DATA_DIR="{{ .Values.backupCronJob.sourceMountPath }}"
                  HOST_TAG="{{ .Values.backupCronJob.hostTag }}"
                  RESTIC_REPOSITORY="{{ printf "%s:%s:%s" .Values.restic.repository.backend .Values.restic.repository.remoteName .Values.restic.repository.remoteFolder }}"
                  SCALE_DOWN_TIMEOUT_SECONDS="{{ trimSuffix "s" .Values.backupCronJob.scaleDownTimeout }}"
                  SCALE_DOWN_POLL_INTERVAL_SECONDS="{{ trimSuffix "s" .Values.backupCronJob.scaleDownPollInterval }}"
                  TMP_EXCLUDES="$(mktemp)"
                  scaled_down=0

                  cleanup() {
                    rm -f "${TMP_EXCLUDES}"
                    if [ "${scaled_down}" = "1" ]; then
                      kubectl -n "${VAULTWARDEN_NAMESPACE}" scale statefulset "${VAULTWARDEN_STATEFULSET}" --replicas="${VAULTWARDEN_REPLICAS}"
                      kubectl -n "${VAULTWARDEN_NAMESPACE}" rollout status "statefulset/${VAULTWARDEN_STATEFULSET}" --timeout="{{ .Values.backupCronJob.scaleTimeout }}"
                    fi
                  }

                  trap cleanup EXIT

                  : > "${TMP_EXCLUDES}"
                  {{- range .Values.backupCronJob.excludePaths }}
                  printf '%s\n' {{ . | quote }} >> "${TMP_EXCLUDES}"
                  {{- end }}

                  kubectl -n "${VAULTWARDEN_NAMESPACE}" scale statefulset "${VAULTWARDEN_STATEFULSET}" --replicas=0
                  scaled_down=1

                  elapsed=0
                  while [ -n "$(kubectl -n "${VAULTWARDEN_NAMESPACE}" get pods -l app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=vaultwarden -o jsonpath='{.items[*].metadata.name}')" ]; do
                    if [ "${elapsed}" -ge "${SCALE_DOWN_TIMEOUT_SECONDS}" ]; then
                      echo "Timed out waiting for Vaultwarden pods to stop after ${SCALE_DOWN_TIMEOUT_SECONDS}s" >&2
                      exit 1
                    fi
                    sleep "${SCALE_DOWN_POLL_INTERVAL_SECONDS}"
                    elapsed=$((elapsed + SCALE_DOWN_POLL_INTERVAL_SECONDS))
                  done

                  restic backup "${VW_DATA_DIR}" \
                    -r "${RESTIC_REPOSITORY}" \
                    --tag {{ .Values.backupCronJob.backupTag | quote }} \
                    --tag "${HOST_TAG}" \
                    --exclude-file "${TMP_EXCLUDES}"{{- range .Values.restic.extraArgs }} \
                    {{ . | quote }}{{- end }}

                  kubectl -n "${VAULTWARDEN_NAMESPACE}" scale statefulset "${VAULTWARDEN_STATEFULSET}" --replicas="${VAULTWARDEN_REPLICAS}"
                  kubectl -n "${VAULTWARDEN_NAMESPACE}" rollout status "statefulset/${VAULTWARDEN_STATEFULSET}" --timeout="{{ .Values.backupCronJob.scaleTimeout }}"
                  scaled_down=0

                  restic forget \
                    -r "${RESTIC_REPOSITORY}" \
                    --tag {{ .Values.backupCronJob.backupTag | quote }} \
                    --keep-last {{ .Values.restic.retention.keepLast }} \
                    --keep-daily {{ .Values.restic.retention.keepDaily }} \
                    --keep-weekly {{ .Values.restic.retention.keepWeekly }} \
                    --keep-monthly {{ .Values.restic.retention.keepMonthly }}{{- if .Values.restic.retention.prune }} \
                    --prune{{- end }}

                  {{- if .Values.backupCronJob.extraScript }}
                  {{ .Values.backupCronJob.extraScript | nindent 18 }}
                  {{- end }}
              resources:
                {{- toYaml .Values.backupCronJob.resources | nindent 16 }}
              volumeMounts:
                - name: data
                  mountPath: {{ .Values.backupCronJob.sourceMountPath }}
                - name: rclone-config
                  mountPath: {{ dir .Values.webdav.configPath }}
                  readOnly: true
                - name: tools
                  mountPath: /tools
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "vaultwarden_backup.pvcName" . }}
            - name: rclone-config
              secret:
                secretName: {{ .Values.backupCronJob.secret.name }}
            - name: tools
              emptyDir: {}
{{- end }}
